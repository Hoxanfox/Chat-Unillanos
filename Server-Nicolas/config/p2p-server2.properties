# ============================================================================
# CONFIGURACIÓN P2P (PEER-TO-PEER) - SERVIDOR 2
# ============================================================================

# ==================== CONFIGURACIÓN GENERAL P2P ====================
# Habilitar o deshabilitar el sistema P2P
p2p.enabled=true

# Puerto del servidor P2P (DIFERENTE al servidor 1)
p2p.puerto=22101

# Nombre identificador del servidor en la red P2P
p2p.nombre.servidor=Servidor-Secundario

# IP del servidor (dejar vacío para auto-detección)
p2p.ip=

# ==================== CONFIGURACIÓN DE HEARTBEAT ====================
# Intervalo entre envíos de heartbeat (en milisegundos)
# Valor recomendado: 30000 (30 segundos)
p2p.heartbeat.interval=30000

# Tiempo máximo sin recibir heartbeat antes de considerar un peer como inactivo (en milisegundos)
# AUMENTADO a 5 minutos para evitar falsos positivos
p2p.heartbeat.timeout=300000

# Habilitar o deshabilitar el sistema de heartbeat
p2p.heartbeat.enabled=true

# ==================== CONFIGURACIÓN DE DESCUBRIMIENTO ====================
# Habilitar el descubrimiento automático de peers
p2p.discovery.enabled=true

# Intervalo para el descubrimiento de nuevos peers (en milisegundos)
# Valor recomendado: 300000 (5 minutos)
p2p.discovery.interval=300000

# Peers de arranque (Bootstrap Peers) - CONECTAR AL SERVIDOR 1
# Formato: ip:puerto separados por coma
# Cambiar 172.29.128.1 por la IP real del servidor 1 si es diferente
p2p.peers.bootstrap=172.29.128.1:22100

# ==================== CONFIGURACIÓN DE CLIENTE P2P ====================
# Timeout para conexiones de cliente P2P (en milisegundos)
p2p.client.timeout=10000

# Número de threads en el pool de clientes P2P
p2p.client.pool.threads=10

# Número de intentos de reintento en caso de fallo
p2p.client.retry.attempts=3

# Delay entre reintentos (en milisegundos)
p2p.client.retry.delay=1000

