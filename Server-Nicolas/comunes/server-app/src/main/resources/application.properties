# ============================================================================
# CONFIGURACIÓN DEL SERVIDOR DE CHAT - ARQUITECTURA P2P
# ============================================================================

# ----------------------------------------------------------------------------
# CONFIGURACIÓN GENERAL DEL SERVIDOR
# ----------------------------------------------------------------------------
server.name=ChatServer-P2P
server.version=1.0.0
server.environment=development

# ----------------------------------------------------------------------------
# CONFIGURACIÓN DE RED
# ----------------------------------------------------------------------------
# Puerto principal del servidor TCP
server.port=22100

# IP del servidor (0.0.0.0 para escuchar en todas las interfaces)
server.host=0.0.0.0

# Número máximo de conexiones simultáneas
server.max.connections=100

# Timeout de conexión en milisegundos
server.connection.timeout=30000

# ----------------------------------------------------------------------------
# CONFIGURACIÓN P2P (PEER-TO-PEER)
# ----------------------------------------------------------------------------
# NOTA: Las configuraciones P2P ahora se leen desde: config/p2p.properties
# Este archivo ya no se utiliza para configuración P2P.
# Para modificar la configuración P2P, editar: config/p2p.properties
# ----------------------------------------------------------------------------

# Las siguientes propiedades han sido movidas a config/p2p.properties:
# - p2p.enabled
# - p2p.puerto
# - p2p.ip
# - p2p.nombre.servidor
# - p2p.heartbeat.interval
# - p2p.heartbeat.timeout
# - p2p.heartbeat.enabled
# - p2p.discovery.enabled
# - p2p.discovery.interval
# - p2p.peers.bootstrap
# - p2p.client.timeout
# - p2p.client.pool.threads
# - p2p.client.retry.attempts
# - p2p.client.retry.delay

# ----------------------------------------------------------------------------
# CONFIGURACIÓN DE BASE DE DATOS
# ----------------------------------------------------------------------------

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Configuración de H2 Database
spring.datasource.url=jdbc:h2:file:./data/chatdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Habilitar consola H2 (solo para desarrollo)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ----------------------------------------------------------------------------
# CONFIGURACIÓN DE LOGGING
# ----------------------------------------------------------------------------

# Nivel de logging general
logging.level.root=INFO

# Nivel de logging para paquetes específicos
logging.level.com.arquitectura=DEBUG
logging.level.com.arquitectura.logicaPeers=DEBUG
logging.level.com.arquitectura.controlador=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

# Archivo de logs
logging.file.name=logs/server.log
logging.file.max-size=10MB
logging.file.max-history=30

# Patrón de logging
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ----------------------------------------------------------------------------
# CONFIGURACIÓN DE CORREO ELECTRÓNICO
# ----------------------------------------------------------------------------

# Configuración SMTP
mail.smtp.host=smtp.gmail.com
mail.smtp.port=587
mail.smtp.auth=true
mail.smtp.starttls.enable=true

# Credenciales (usar variables de entorno en producción)
# mail.smtp.username=tu-email@gmail.com
# mail.smtp.password=tu-password

# Remitente por defecto
mail.from=noreply@chatserver.com

# ----------------------------------------------------------------------------
# CONFIGURACIÓN DE ARCHIVOS
# ----------------------------------------------------------------------------

# Directorio base para almacenamiento de archivos
file.storage.base.path=./storage

# Tamańo máximo de archivo en bytes (50 MB)
file.upload.max.size=52428800

# Tamańo de chunk para transferencia de archivos (1 MB)
file.chunk.size=1048576

# Tipos de archivo permitidos (separados por coma)
file.allowed.types=jpg,jpeg,png,gif,pdf,doc,docx,txt,mp3,wav,ogg

# ----------------------------------------------------------------------------
# CONFIGURACIÓN DE SEGURIDAD
# ----------------------------------------------------------------------------

# Habilitar autenticación
security.authentication.enabled=true

# Tiempo de expiración de sesión en minutos
security.session.timeout=60

# Número máximo de intentos de login fallidos
security.login.max.attempts=5

# Tiempo de bloqueo después de intentos fallidos (minutos)
security.login.lockout.duration=15

# ----------------------------------------------------------------------------
# CONFIGURACIÓN DE PERFORMANCE
# ----------------------------------------------------------------------------

# Tamańo del pool de threads para procesamiento asíncrono
async.executor.pool.size=10

# Tamańo máximo de cola para tareas asíncronas
async.executor.queue.capacity=100

# Habilitar caché
cache.enabled=true

# Tiempo de expiración de caché en segundos
cache.expiration=300

# ----------------------------------------------------------------------------
# CONFIGURACIÓN DE DESARROLLO/PRODUCCIÓN
# ----------------------------------------------------------------------------

# Perfil activo (development, production, test)
spring.profiles.active=development

# Habilitar modo debug
debug=false

# Habilitar actuator endpoints (solo desarrollo)
management.endpoints.web.exposure.include=health,info,metrics

# ----------------------------------------------------------------------------
# NOTAS DE CONFIGURACIÓN
# ----------------------------------------------------------------------------
# 
# 1. Para producción, usar variables de entorno para valores sensibles:
#    - Credenciales de base de datos
#    - Credenciales de correo
#    - Claves de API
#
# 2. Ajustar timeouts según la latencia de red esperada
#
# 3. El puerto P2P debe ser accesible desde otros servidores
#
# 4. Para múltiples servidores, configurar p2p.peers.bootstrap con
#    la lista de peers conocidos
#
# 5. Los intervalos de heartbeat deben ser menores que el timeout
#    Recomendado: interval = timeout / 3
#
# ============================================================================
